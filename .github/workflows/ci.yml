name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: sites/pnpm-lock.yaml
      - name: Validate native application
        run: |
          node --test tests/*.test.js
          node tests/smoke.js
      - run: pnpm install --frozen-lockfile
        working-directory: sites
      - run: pnpm test
        working-directory: sites
      - run: pnpm build
        working-directory: sites
